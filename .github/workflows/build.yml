name: Build IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          
          SWIFT_FILES=$(find . -name "*.swift" | tr '\n' ' ')
          echo "Files: $SWIFT_FILES"
          
          xcrun -sdk iphoneos swiftc \
            -target arm64-apple-ios16.0 \
            -O \
            -framework SwiftUI \
            -framework UIKit \
            -framework Foundation \
            -framework WebKit \
            -framework AVKit \
            -framework MediaPlayer \
            -framework AVFoundation \
            -o App \
            $SWIFT_FILES
          
          echo "Binary size:"
          ls -la App
          file App
      
      - name: Package IPA
        run: |
          mkdir -p Payload/PhimHay.app
          cp App Payload/PhimHay.app/
          
          cat > Payload/PhimHay.app/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>App</string>
          <key>CFBundleIdentifier</key><string>com.emmew.app</string>
          <key>CFBundleName</key><string>EMCC</string>
          <key>CFBundleDisplayName</key><string>EMCC</string>
          <key>CFBundleVersion</key><string>1</string>
          <key>CFBundleShortVersionString</key><string>1.0</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>LSRequiresIPhoneOS</key><true/>
          <key>UILaunchScreen</key><dict/>
          <key>UISupportedInterfaceOrientations</key>
          <array>
              <string>UIInterfaceOrientationPortrait</string>
              <string>UIInterfaceOrientationLandscapeLeft</string>
              <string>UIInterfaceOrientationLandscapeRight</string>
          </array>
          <key>MinimumOSVersion</key><string>16.0</string>
          <key>NSAppTransportSecurity</key>
          <dict>
              <key>NSAllowsArbitraryLoads</key><true/>
              <key>NSAllowsArbitraryLoadsInWebContent</key><true/>
              <key>NSAllowsArbitraryLoadsForMedia</key><true/>
              <key>NSAllowsLocalNetworking</key><true/>
          </dict>
          <key>UIBackgroundModes</key>
          <array>
              <string>audio</string>
          </array>
          <key>LSApplicationQueriesSchemes</key>
          <array>
              <string>infuse</string>
              <string>vlc-x-callback</string>
              <string>vimu</string>
              <string>outplayer</string>
              <string>nplayer</string>
              <string>pxtreme</string>
              <string>fbplayer</string>
              <string>mxplayer</string>
              <string>iina</string>
          </array>
          </dict></plist>
          EOF
          
          zip -r EMCC.ipa Payload/
          ls -la EMCC.ipa
      
      - uses: actions/upload-artifact@v4
        with:
          name: EMCC-IPA
          path: EMCC.ipa