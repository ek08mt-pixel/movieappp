name: Build IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup
        run: |
          mkdir -p Payload/PhimHay.app
          
          cat > Payload/PhimHay.app/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>Phim Hay</string>
              <key>CFBundleDisplayName</key>
              <string>Phim Hay</string>
              <key>CFBundleIdentifier</key>
              <string>com.phimhay.app</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleExecutable</key>
              <string>PhimHay</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array><string>arm64</string></array>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UISupportedInterfaceOrientations</key>
              <array><string>UIInterfaceOrientationPortrait</string></array>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>NSAppTransportSecurity</key>
              <dict>
                  <key>NSAllowsArbitraryLoads</key>
                  <true/>
              </dict>
              <key>MinimumOSVersion</key>
              <string>16.0</string>
          </dict>
          </plist>
          EOF
      
      - name: Build Swift
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          
          swiftc \
            -sdk "$SDK" \
            -target arm64-apple-ios16.0 \
            -parse-as-library \
            -module-name PhimHay \
            -o Payload/PhimHay.app/PhimHay \
            MovieApp.swift \
            ContentView.swift \
            Models.swift \
            APIService.swift \
            Views/HomeView.swift \
            Views/HeroBanner.swift \
            Views/MovieCard.swift \
            Views/MovieSection.swift \
            Views/SearchView.swift \
            Views/HistoryView.swift \
            Views/ProfileView.swift \
            Views/LoginView.swift \
            Views/MovieDetailView.swift \
            Views/ActorDetailView.swift \
            Views/MovieListView.swift \
            ViewModels/HomeViewModel.swift \
            ViewModels/SearchViewModel.swift \
            ViewModels/MovieDetailViewModel.swift \
            -Xlinker -dead_strip
          
          echo "Binary:"
          file Payload/PhimHay.app/PhimHay
      
      - name: Package IPA
        run: |
          cd Payload
          zip -r ../PhimHay.ipa .
          cd ..
          ls -la PhimHay.ipa
      
      - uses: actions/upload-artifact@v4
        with:
          name: PhimHay-IPA
          path: PhimHay.ipa
