name: Build IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Create AppEntry
        run: |
          cat > AppEntry.swift << 'EOF'
          import SwiftUI
          
          class AppState: ObservableObject {
              @Published var favorites: [Movie] = []
              @Published var watchHistory: [Movie] = []
              @Published var searchHistory: [String] = []
              @Published var isLoggedIn = false
              @Published var userName = ""
          }
          
          @main struct AppEntry: App {
              @StateObject var appState = AppState()
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                          .environmentObject(appState)
                          .preferredColorScheme(.dark)
                  }
              }
          }
          EOF
      
      - name: Build
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          
          SWIFT_FILES=$(find . -name "*.swift" -not -name "MovieApp.swift" | tr '\n' ' ')
          echo "Files: $SWIFT_FILES"
          
          xcrun -sdk iphoneos swiftc \
            -target arm64-apple-ios16.0 \
            -O \
            -framework SwiftUI \
            -framework UIKit \
            -framework Foundation \
            -o App \
            $SWIFT_FILES
          
          echo "Binary size:"
          ls -la App
          file App
      
      - name: Package IPA
        run: |
          mkdir -p Payload/PhimHay.app
          cp App Payload/PhimHay.app/
          
          cat > Payload/PhimHay.app/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>App</string>
          <key>CFBundleIdentifier</key><string>com.phimhay.app</string>
          <key>CFBundleName</key><string>Phim Hay</string>
          <key>CFBundleVersion</key><string>1</string>
          <key>CFBundleShortVersionString</key><string>1.0</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>LSRequiresIPhoneOS</key><true/>
          <key>UILaunchScreen</key><dict/>
          <key>UISupportedInterfaceOrientations</key><array><string>UIInterfaceOrientationPortrait</string></array>
          <key>MinimumOSVersion</key><string>16.0</string>
          <key>NSAppTransportSecurity</key><dict><key>NSAllowsArbitraryLoads</key><true/></dict>
          </dict></plist>
          EOF
          
          zip -r PhimHay.ipa Payload/
          ls -la PhimHay.ipa
      
      - uses: actions/upload-artifact@v4
        with:
          name: PhimHay-IPA
          path: PhimHay.ipa
