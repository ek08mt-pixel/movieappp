name: Build IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Project
        run: |
          # Tạo thư mục app
          mkdir -p App
          find . -name "*.swift" -exec cp {} App/ \;
          
          # Info.plist
          cat > App/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>App</string>
          <key>CFBundleIdentifier</key><string>com.phimhay.app</string>
          <key>CFBundleName</key><string>Phim Hay</string>
          <key>CFBundleVersion</key><string>1</string>
          <key>CFBundleShortVersionString</key><string>1.0</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>LSRequiresIPhoneOS</key><true/>
          <key>UILaunchScreen</key><dict/>
          <key>UISupportedInterfaceOrientations</key><array><string>UIInterfaceOrientationPortrait</string></array>
          <key>MinimumOSVersion</key><string>16.0</string>
          <key>NSAppTransportSecurity</key><dict><key>NSAllowsArbitraryLoads</key><true/></dict>
          </dict></plist>
          EOF
          
          # Tạo file .swift tổng hợp
          cat > App/AppEntry.swift << 'EOF'
          import SwiftUI
          @main struct AppEntry: App { var body: some Scene { WindowGroup { ContentView().environmentObject(AppState()) } } }
          EOF
      
      - name: Build IPA
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # Build binary
          xcrun -sdk iphoneos swiftc \
            -target arm64-apple-ios16.0 \
            -O \
            -framework SwiftUI \
            -framework UIKit \
            -framework Foundation \
            -o App/App \
            App/*.swift
          
          # Tạo Payload
          mkdir -p Payload/PhimHay.app
          cp App/App Payload/PhimHay.app/
          cp App/Info.plist Payload/PhimHay.app/
          
          # Kiểm tra
          file Payload/PhimHay.app/App
          ls -la Payload/PhimHay.app/
          
          # Zip
          cd Payload && zip -r ../PhimHay.ipa . && cd ..
          ls -la PhimHay.ipa
      
      - uses: actions/upload-artifact@v4
        with:
          name: PhimHay-IPA
          path: PhimHay.ipa
