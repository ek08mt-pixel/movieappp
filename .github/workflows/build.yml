name: Build IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Xcode Project
        run: |
          mkdir -p MovieApp
          cp *.swift MovieApp/
          cp -r Views MovieApp/ 2>/dev/null || true
          cp -r ViewModels MovieApp/ 2>/dev/null || true
          cp -r Utils MovieApp/ 2>/dev/null || true
          
          cat > MovieApp.xcodeproj/project.pbxproj << 'XEOF'
          // Xcode project file
          XEOF
          
      - name: Build with xcodebuild
        run: |
          # Tạo Info.plist
          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>Phim Hay</string>
              <key>CFBundleIdentifier</key>
              <string>com.phimhay.app</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array><string>arm64</string></array>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UIStatusBarStyle</key>
              <string>UIStatusBarStyleDarkContent</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>NSAppTransportSecurity</key>
              <dict>
                  <key>NSAllowsArbitraryLoads</key>
                  <true/>
              </dict>
          </dict>
          </plist>
          EOF
          
          # Build Swift files directly
          mkdir -p Payload/PhimHay.app
          
          swiftc -o Payload/PhimHay.app/PhimHay \
              -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
              -target arm64-apple-ios14.0 \
              -framework SwiftUI \
              -framework Foundation \
              -framework UIKit \
              *.swift Views/*.swift ViewModels/*.swift Utils/*.swift
          
          cp Info.plist Payload/PhimHay.app/
          
          zip -r PhimHay.ipa Payload/
      
      - uses: actions/upload-artifact@v4
        with:
          name: PhimHay-IPA
          path: PhimHay.ipa
